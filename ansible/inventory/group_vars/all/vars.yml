---
# Platform-wide variables

primary_domain: jimr.fyi
supabase_api_domain: api.jimr.fyi
supabase_studio_domain: jimr.fyi
supabase_dir: /opt/supabase
apps_dir: /opt/apps
backup_dir: /opt/backups
backup_bucket: jmr-backups
app_distribution_domain: apps.jimr.fyi
monitoring_domain: status.jimr.fyi
auth_domain: auth.jimr.fyi
gitea_domain: git.jimr.fyi
apk_retention_count: 5

# OAuth 2.1 Server / asymmetric (ES256) JWT signing.
# When true, GoTrue signs user JWTs with ES256 and exposes /oauth/authorize.
# When false, GoTrue mints HS256 user JWTs validated by PostgREST + edge-runtime
# using the shared JWT_SECRET — the simple, working V1.2 configuration.
#
# Re-enabling this requires PostgREST and edge-runtime to validate ES256 via
# the JWKS endpoint. Until that downstream wiring lands (V1.3 punch list),
# leave this false — otherwise user JWTs validate at sign-in but fail at
# every PostgREST RPC and Edge Function call. See implementer's
# reference_es256_user_jwt_blocker.md for the failure modes.
oauth_server_enabled: false
ci_deploy_public_key: "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIPMpe8/hgmlj+2Nlvymf8iWxBnNzaIBUyPkDtJvz2+R6 ci-deploy@platform"

# Edge Functions sourced from sibling tenant repos. The playbook reads
# from ../<repo>/supabase/functions/<function>/ — CI must check out
# siblings before applying. Each entry deploys to {supabase_dir}/docker/
# volumes/functions/<function>/ on VPS1.
#
# Add tenants here only AFTER their Edge Function code is reviewed AND
# their migrations are applied — otherwise a broken handler lands and
# crashes on first request.
tenant_edge_functions:
  - { repo: dungeon-master, function: turn }

# Tenant repos whose supabase/migrations/*.sql land on the shared Postgres
# via the Ansible role. Replaces the tenant-side deploy.yml psql apply path.
# Migrations must be idempotent — they re-run on every playbook apply.
tenant_db_repos:
  - dungeon-master

# Luanti game server
luanti_dir: /opt/luanti
luanti_image_tag: "5.16.0"
luanti_mineclonia_release_id: "35899"
luanti_server_name: "Eagle Crest"
luanti_server_description: "Neighborhood survival server — Eagle Crest community"
luanti_motd: "Welcome to Eagle Crest! Be kind, build cool stuff."
luanti_max_players: 20
luanti_enable_pvp: true

luanti_mods:
  - name: protector
    author: TenPlus1
    release_id: "35096"
  - name: worldgate
    author: EmptyStar
    release_id: "31097"
  - name: enderpearl
    author: giov4
    release_id: "32185"
  - name: x_bows
    author: SaKeL
    release_id: "30547"
  - name: zoonami
    author: isaiah658
    release_id: "35031"

# Tenant list — add new apps here
# Each tenant has its own domain (subdomain of primary or standalone)
# Apps with mobile builds get an `apps` list with slug only;
# version metadata lives in Supabase app_releases table.
tenants:
  - name: house-ops
    domain: house.jimr.fyi
    database: house_ops
    repo: house-ops
    apps:
      - slug: houseops

  - name: practice-exchange
    domain: practice.exchange
    database: practice_exchange
    repo: practice-exchange

  - name: event-planner
    domain: hike.jimr.fyi
    database: event_planner
    repo: event-planner
    apps:
      - slug: hikesms

  - name: minecraft-companion
    domain: minecraft.jimr.fyi
    database: minecraft_companion
    repo: minecraft-companion

  # dungeon-master uses the shared `postgres` DB (per D13) for cross-schema
  # FKs to auth.users — no per-tenant database is created.
  # The container itself self-deploys via dungeon-master's GitHub Actions
  # workflow (~/.claude/references/github-actions-vps-deploy.md). Platform
  # owns: Caddy reverse proxy, schema migration, OAuth client registration.
  - name: dungeon-master
    domain: dm.jimr.fyi
    repo: dungeon-master
