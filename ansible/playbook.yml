---
- name: Apply infrastructure
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - inventory/group_vars/all/vault.yml

  tasks:
    - name: Terraform init
      command: >
        {{ terraform_binary | default('terraform') }} init
      args:
        chdir: "{{ playbook_dir }}/../terraform/hetzner"

    - name: Terraform apply
      command: >
        {{ terraform_binary | default('terraform') }} apply -auto-approve
        -var="hcloud_token={{ vault_hcloud_token }}"
      args:
        chdir: "{{ playbook_dir }}/../terraform/hetzner"

- name: Provision JMR Platform
  hosts: platform
  become: true

  roles:
    - { role: common, tags: [common] }
    - { role: monitoring, tags: [monitoring] }
    - { role: supabase, tags: [supabase] }
    - role: pomerium
      tags: [pomerium]
      when: pomerium_enabled | default(false)
    - { role: app-distribution, tags: [app-distribution] }
    - { role: luanti, tags: [luanti] }

