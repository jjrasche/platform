# systemd drop-in for fail2ban: must start AFTER docker so the
# DOCKER-USER iptables chain exists by the time the pomerium-auth
# jail tries to install its f2b-pomerium-auth jump rule.
#
# Without this, fail2ban can win the boot race and its actionstart
# silently fails — bans get tracked in memory but never enforce.

[Unit]
After=docker.service
Requires=docker.service
