# fail2ban filter for Pomerium auth-gate denials.
#
# Threat model: credential-stuffing / brute-force against the IAP login flow
# and unauthenticated probes against gated routes (jimr.fyi, git.jimr.fyi,
# status.jimr.fyi, apps.jimr.fyi). High-volume DDoS is handled by
# Cloudflare's edge — this layer just rate-limits per-IP at the origin.
#
# Log source: Docker json-file driver for the supabase-pomerium-1 container.
# The jail points fail2ban at /var/lib/docker/containers/<id>/<id>-json.log.
# Each line is the Docker wrapper:
#   {"log":"<inner-pomerium-json>\n","stream":"stdout","time":"<rfc3339>"}
# Inside the wrapped "log" field, every " is \" and every \ is \\.
#
# Signal: Pomerium emits an envoy http-request log line with
#   response-code-details":"ext_authz_denied"
# whenever an unauthenticated request is bounced from a gated route. We
# capture the FIRST IP of forwarded-for — for Cloudflare-fronted traffic
# this is the true client; the comma-prefixed second segment is the CF
# edge IP. Pomerium's top-level "ip" field is the CF edge and would ban
# Cloudflare itself, so we deliberately ignore it.
#
# Regex anchoring: the docker wrapper escapes quotes as \", so the literal
# text we need to match in the file is forwarded-for\":\". In Python
# regex source that's forwarded-for\\":\\" — and that's exactly what
# fail2ban hands to re.compile from this conf.
#
# The trailing [\d:a-fA-F.]+\\" enforces a second XFF segment, which all
# real (Cloudflare-fronted) requests have. Direct-to-VPS hits with a
# bare XFF won't match — those can't reach 443 anyway without CF.

[INCLUDES]
before = common.conf

[Definition]

failregex = forwarded-for\\":\\"<HOST>,[\d:a-fA-F.]+\\".*response-code-details\\":\\"ext_authz_denied

ignoreregex =
