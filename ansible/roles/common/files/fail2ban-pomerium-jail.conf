# fail2ban jail for Pomerium auth-gate denials.
#
# Target: any single client IP that exceeds ~20 sustained req/s of denied
# (unauthenticated) traffic against the gated routes for 30s gets banned
# for 1 hour. Filter regex extracts the first forwarded-for segment, which
# is the true client behind Cloudflare's edge.
#
# Ban path: traffic to Pomerium's published ports (80/443) is DNAT'd into
# the docker network, traversing FORWARD → DOCKER chains. It NEVER hits
# INPUT, so fail2ban's default chain=INPUT silently does nothing. We use
# chain=DOCKER-USER, which Docker guarantees to be evaluated FIRST in
# FORWARD before its own DOCKER chain accepts the packet.
#
# ignoreip: the VPS itself shows up as the first XFF segment for
# Gatus health probes (Gatus runs in the same docker network and reaches
# Pomerium via 91.98.158.239 → CF → back). Banning the VPS would break
# every health check. Localhost ranges included for completeness.

[pomerium-auth]
enabled  = true
filter   = pomerium-auth
backend  = polling
logpath  = /var/lib/docker/containers/*/*-json.log
maxretry = 600
findtime = 30
bantime  = 3600
action   = iptables-allports[name=pomerium-auth, chain=DOCKER-USER]
ignoreip = 127.0.0.1/8 ::1 91.98.158.239 172.16.0.0/12
