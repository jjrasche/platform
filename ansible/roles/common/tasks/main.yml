---
# Common server setup: deploy user, Docker, Caddy, backup cron

- name: Create deploy user
  user:
    name: deploy
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

- name: Allow deploy user passwordless sudo
  copy:
    content: "deploy ALL=(ALL) NOPASSWD: ALL\n"
    dest: /etc/sudoers.d/deploy
    mode: "0440"

- name: Add SSH key for deploy user
  authorized_key:
    user: deploy
    key: "{{ lookup('file', '~/.ssh/id_platform.pub') }}"

- name: Add CI deploy key for deploy user
  authorized_key:
    user: deploy
    key: "{{ ci_deploy_public_key }}"

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - git
      - postgresql-client
    state: present

# gnupg is pinned by version per the "pin everything" rule. The backup pipeline
# encrypts pg_dump output to a public key; a silent gnupg ABI change must not
# break decryption.
- name: Install pinned gnupg for backup encryption
  apt:
    name: "gnupg=2.4.4-2ubuntu17.4"
    state: present
    allow_downgrade: true

- name: Check if swap file exists
  stat:
    path: /swapfile
  register: swap_stat

- name: Allocate 4 GB swap file
  command: fallocate -l 4G /swapfile
  when: not swap_stat.stat.exists

- name: Restrict swap file permissions
  file:
    path: /swapfile
    mode: "0600"

- name: Format swap file
  command: mkswap /swapfile
  when: not swap_stat.stat.exists

- name: Persist swap in /etc/fstab
  lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present

- name: Activate swap if not already enabled
  command: swapon /swapfile
  when: ansible_swaptotal_mb | int < 100

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') | replace('aarch64', 'arm64') }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  user:
    name: deploy
    groups: docker
    append: true

- name: Create backup directory
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"

# Dedicated GNUPGHOME for the backup keyring. Root-only; backup cron runs as
# root. Holds ONLY the public key — the private key stays offline. See
# docs/runbooks/backup-restore.md.
- name: Create backup GPG home
  file:
    path: "{{ backup_dir }}/.gnupg"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Deploy platform scripts
  copy:
    src: "{{ playbook_dir }}/../scripts/"
    dest: "{{ apps_dir }}/scripts/"
    mode: "0755"

# Encrypt-at-source: backup.sh pipes pg_dump → gzip → gpg --encrypt before
# writing to /opt/backups. The recipient public key is committed in the repo;
# the matching private key lives offline in Jim's password manager. If the
# .asc file is still the repo's placeholder, skip the import and warn — the
# nightly script will refuse to run until a real key is present.
- name: Detect whether backup public key is real (not the placeholder)
  ansible.builtin.command:
    cmd: grep -q "BEGIN PGP PUBLIC KEY BLOCK" "{{ apps_dir }}/scripts/backup-public.asc"
  register: backup_pubkey_present
  changed_when: false
  failed_when: false

- name: Import backup public key into VPS keyring
  ansible.builtin.command:
    cmd: >-
      gpg --homedir {{ backup_dir }}/.gnupg --batch --yes
      --import {{ apps_dir }}/scripts/backup-public.asc
  when: backup_pubkey_present.rc == 0
  changed_when: false

- name: Warn when backup public key is still the placeholder
  ansible.builtin.debug:
    msg: >-
      scripts/backup-public.asc is still the placeholder. Nightly backups will
      FAIL until you generate a keypair (see docs/runbooks/backup-restore.md),
      commit the public key + fingerprint, and re-run this playbook.
  when: backup_pubkey_present.rc != 0

- name: Create daily backup cron
  cron:
    name: "platform-backup"
    hour: "3"
    minute: "0"
    job: "{{ apps_dir }}/scripts/backup.sh >> /var/log/platform-backup.log 2>&1"

- name: Install unattended-upgrades
  apt:
    name: unattended-upgrades
    state: present

- name: Enable automatic security updates
  copy:
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    mode: "0644"

- name: Configure unattended-upgrades
  copy:
    content: |
      Unattended-Upgrade::Allowed-Origins {
          "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::Automatic-Reboot "false";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    mode: "0644"

- name: Install fail2ban
  apt:
    name: fail2ban
    state: present

- name: Configure fail2ban SSH jail
  copy:
    content: |
      [sshd]
      enabled = true
      port = 22
      filter = sshd
      maxretry = 5
      bantime = 3600
      findtime = 600
    dest: /etc/fail2ban/jail.d/sshd.conf
    mode: "0644"
  notify: restart fail2ban

- name: Start and enable fail2ban
  systemd:
    name: fail2ban
    state: started
    enabled: true

