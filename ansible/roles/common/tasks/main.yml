---
# Common server setup: deploy user, Docker, Caddy, backup cron

- name: Create deploy user
  user:
    name: deploy
    shell: /bin/bash
    groups: sudo
    append: true
    create_home: true

- name: Allow deploy user passwordless sudo
  copy:
    content: "deploy ALL=(ALL) NOPASSWD:ALL\n"
    dest: /etc/sudoers.d/deploy
    mode: "0440"

- name: Add SSH key for deploy user
  authorized_key:
    user: deploy
    key: "{{ lookup('file', '~/.ssh/id_platform.pub') }}"

- name: Update apt cache
  apt:
    update_cache: true
    cache_valid_time: 3600

- name: Install required packages
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - git
      - postgresql-client
    state: present

- name: Add Docker GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: "0644"

- name: Add Docker apt repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Start and enable Docker
  systemd:
    name: docker
    state: started
    enabled: true

- name: Add deploy user to docker group
  user:
    name: deploy
    groups: docker
    append: true

- name: Create backup directory
  file:
    path: "{{ backup_dir }}"
    state: directory
    mode: "0700"

- name: Create daily backup cron
  cron:
    name: "platform-backup"
    hour: "3"
    minute: "0"
    job: "{{ apps_dir }}/scripts/backup.sh >> /var/log/platform-backup.log 2>&1"
