---
# Deploy dungeon-master backend (FastAPI) + factored-ui wasm static client.
# Depends on supabase role having applied the dm schema migration to the
# shared `postgres` database (per D13 — co-located with auth.users so
# cross-schema FKs work).

- name: Create dungeon-master compose directory
  file:
    path: "{{ dungeon_master_dir }}"
    state: directory
    mode: "0755"

- name: Create dungeon-master static web root
  file:
    path: "{{ dungeon_master_static_dir }}"
    state: directory
    mode: "0755"

- name: Create Caddy log directory for dungeon-master
  file:
    path: /var/log/caddy
    state: directory
    mode: "0755"

- name: Sync wasm client bundle to web root
  copy:
    src: "{{ playbook_dir }}/../../dungeon-master/client/build/dist/wasmJs/productionExecutable/"
    dest: "{{ dungeon_master_static_dir }}/"
    mode: "0644"
    directory_mode: "0755"

- name: Create dm_app Postgres role
  shell: |
    docker exec supabase-db psql -U supabase_admin -d postgres -tc \
      "SELECT 1 FROM pg_roles WHERE rolname = 'dm_app'" \
      | grep -q 1 || \
    docker exec supabase-db psql -U supabase_admin -d postgres -c \
      "CREATE ROLE dm_app LOGIN PASSWORD '{{ vault_dm_db_password }}'"
  register: dm_role_create
  changed_when: "'CREATE ROLE' in dm_role_create.stdout"
  no_log: true

- name: Update dm_app Postgres role password
  shell: |
    docker exec supabase-db psql -U supabase_admin -d postgres -c \
      "ALTER ROLE dm_app WITH PASSWORD '{{ vault_dm_db_password }}'"
  changed_when: false
  no_log: true

- name: Grant dm_app connect on shared postgres database
  # Per D13 the dm schema lives in the shared `postgres` DB, not a
  # dedicated tenant DB.
  shell: |
    docker exec supabase-db psql -U supabase_admin -d postgres -c \
      "GRANT CONNECT ON DATABASE postgres TO dm_app"
  changed_when: false

- name: Grant dm_app schema usage on dm schema in postgres DB
  shell: |
    docker exec supabase-db psql -U supabase_admin -d postgres -c \
      "GRANT USAGE ON SCHEMA dm TO dm_app; \
       GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA dm TO dm_app; \
       GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA dm TO dm_app; \
       ALTER DEFAULT PRIVILEGES IN SCHEMA dm GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO dm_app; \
       ALTER DEFAULT PRIVILEGES IN SCHEMA dm GRANT USAGE, SELECT ON SEQUENCES TO dm_app;"
  changed_when: false

- name: Grant dm_app read access to auth.users for FK validation
  # FKs from dm.campaigns.owner_id and dm.players.user_id reference
  # auth.users(id). Postgres requires REFERENCES privilege on the parent
  # table for the FK constraint to be enforced when dm_app inserts rows.
  shell: |
    docker exec supabase-db psql -U supabase_admin -d postgres -c \
      "GRANT USAGE ON SCHEMA auth TO dm_app; \
       GRANT SELECT, REFERENCES ON auth.users TO dm_app;"
  changed_when: false

- name: Login to GHCR for dungeon-master image
  community.docker.docker_login:
    registry: ghcr.io
    username: jjrasche
    password: "{{ vault_ghcr_token }}"
  when: vault_ghcr_token is defined and vault_ghcr_token != "CHANGE_ME"

- name: Template dungeon-master docker-compose
  template:
    src: docker-compose.yml.j2
    dest: "{{ dungeon_master_dir }}/docker-compose.yml"
    mode: "0600"
  register: dm_compose

- name: Pull dungeon-master backend image
  community.docker.docker_image:
    name: "{{ dungeon_master_image }}"
    source: pull
    force_source: true

- name: Start dungeon-master backend
  community.docker.docker_compose_v2:
    project_src: "{{ dungeon_master_dir }}"
    state: present
    pull: missing

- name: Restart dungeon-master if compose changed
  community.docker.docker_compose_v2:
    project_src: "{{ dungeon_master_dir }}"
    state: restarted
  when: dm_compose is changed

- name: Reload Caddy to pick up dm.jimr.fyi block and static mount
  shell: docker restart $(docker ps --format '{% raw %}{{.Names}}{% endraw %}' | grep caddy)
  when: dm_compose is changed
  changed_when: false

- name: Wait for dungeon-master backend health
  shell: |
    docker exec dungeon-master-backend wget -qO- http://localhost:8080/healthz
  register: dm_health
  retries: 12
  delay: 5
  until: dm_health.rc == 0 and 'ok' in dm_health.stdout
  changed_when: false
