---
# Pre-deploy: render Pomerium + static-jimr config files. Must run BEFORE
# `community.docker.docker_compose_v2` brings up the supabase stack —
# the compose override bind-mounts these specific paths AS FILES, so if
# they don't exist when compose-up runs, docker auto-creates them as
# directories and the container init explodes mounting "directory onto
# a file". Hooked into supabase/tasks/main.yml via include_role.

- name: Create Pomerium config + certs directories on VPS
  file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ supabase_dir }}/docker/volumes/pomerium", mode: "0755" }
    - { path: "{{ supabase_dir }}/docker/volumes/pomerium/certs", mode: "0700" }

- name: Create static sidecar config + content directories
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ supabase_dir }}/docker/volumes/static-jimr"
    - "{{ supabase_dir }}/docker/volumes/static-jimr/oidc"

- name: Render Pomerium config
  template:
    src: pomerium-config.yaml.j2
    dest: "{{ supabase_dir }}/docker/volumes/pomerium/config.yaml"
    mode: "0640"
  register: pomerium_config_rendered

- name: Drop Cloudflare Origin Certificate
  copy:
    content: "{{ vault_pomerium_origin_cert }}"
    dest: "{{ supabase_dir }}/docker/volumes/pomerium/certs/origin.crt"
    mode: "0644"
  register: pomerium_cert_rendered
  no_log: true

- name: Drop Cloudflare Origin private key
  copy:
    content: "{{ vault_pomerium_origin_key }}"
    dest: "{{ supabase_dir }}/docker/volumes/pomerium/certs/origin.key"
    mode: "0600"
  register: pomerium_key_rendered
  no_log: true

- name: Drop Cloudflare Origin Certificate for practice.exchange (2nd zone)
  copy:
    content: "{{ vault_pomerium_exchange_cert | default('') }}"
    dest: "{{ supabase_dir }}/docker/volumes/pomerium/certs/exchange.crt"
    mode: "0644"
  register: pomerium_exchange_cert_rendered
  when: vault_pomerium_exchange_cert is defined
  no_log: true

- name: Drop Cloudflare Origin private key for practice.exchange (2nd zone)
  copy:
    content: "{{ vault_pomerium_exchange_key | default('') }}"
    dest: "{{ supabase_dir }}/docker/volumes/pomerium/certs/exchange.key"
    mode: "0600"
  register: pomerium_exchange_key_rendered
  when: vault_pomerium_exchange_key is defined
  no_log: true

- name: Render static sidecar nginx.conf
  template:
    src: static-nginx.conf.j2
    dest: "{{ supabase_dir }}/docker/volumes/static-jimr/nginx.conf"
    mode: "0644"
  register: static_nginx_rendered

- name: Render corrected OIDC discovery JSON
  template:
    src: openid-configuration.json.j2
    dest: "{{ supabase_dir }}/docker/volumes/static-jimr/oidc/openid-configuration.json"
    mode: "0644"
  register: oidc_discovery_rendered

# Stash the changed-status flags in role-scoped facts so the post-deploy
# main.yml can decide whether to restart containers without re-running
# the templates.
- name: Stash pomerium template-change flags
  set_fact:
    pomerium_config_changed: "{{ pomerium_config_rendered is changed or pomerium_cert_rendered is changed or pomerium_key_rendered is changed or (pomerium_exchange_cert_rendered.changed | default(false)) or (pomerium_exchange_key_rendered.changed | default(false)) }}"
    static_nginx_changed: "{{ static_nginx_rendered is changed or oidc_discovery_rendered is changed }}"
