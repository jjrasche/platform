---
# Deploy shared Supabase stack

- name: Clone Supabase repo
  git:
    repo: https://github.com/supabase/supabase.git
    dest: "{{ supabase_dir }}"
    depth: 1
    version: v1.26.03
    force: true

- name: Template Supabase .env
  template:
    src: env.j2
    dest: "{{ supabase_dir }}/docker/.env"
    mode: "0600"

- name: Template docker-compose.override.yml
  template:
    src: docker-compose.override.yml.j2
    dest: "{{ supabase_dir }}/docker/docker-compose.override.yml"
    mode: "0644"

- name: Create auth portal directory
  file:
    path: /opt/auth-portal
    state: directory
    mode: "0755"

- name: Compute portal asset version (cache-bust stamp)
  set_fact:
    portal_asset_version: "{{ ansible_date_time.epoch }}"

- name: Deploy auth portal files (non-templated assets)
  copy:
    src: "{{ playbook_dir }}/../portal/"
    dest: /opt/auth-portal/
    mode: "0644"

- name: Template auth portal index.html with cache-busted asset versions
  template:
    src: "{{ playbook_dir }}/../portal/index.html"
    dest: /opt/auth-portal/index.html
    mode: "0644"

- name: Template auth portal config with anon key
  template:
    src: portal-config.js.j2
    dest: /opt/auth-portal/config.js
    mode: "0644"

# dungeon-master config.js — platform owns env-specific values (URL + anon
# key); the dungeon-master CI deploy preserves this file across rebuilds.
# Co-located with the wasm bundle in /var/www/dungeon-master/ so Caddy's
# file_server picks it up at https://dm.jimr.fyi/config.js.
- name: Ensure dungeon-master static dir exists
  file:
    path: /var/www/dungeon-master
    state: directory
    mode: "0755"
    owner: deploy
    group: deploy

- name: Template dungeon-master config.js
  template:
    src: dm-config.js.j2
    dest: /var/www/dungeon-master/config.js
    mode: "0644"
    owner: deploy
    group: deploy

- name: Check if JWKS route exists in Kong config
  command: grep -q 'auth-v1-open-jwks' "{{ supabase_dir }}/docker/volumes/api/kong.yml"
  register: jwks_route_check
  failed_when: false
  changed_when: false
  when: oauth_server_enabled and vault_gotrue_jwt_keys is defined

- name: Add JWKS route to Kong config
  shell: |
    cat >> "{{ supabase_dir }}/docker/volumes/api/kong.yml" <<'EOF'
      - name: auth-v1-open-jwks
        url: http://auth:9999/.well-known/jwks.json
        routes:
          - name: auth-v1-open-jwks
            strip_path: true
            paths:
              - /auth/v1/.well-known/jwks.json
        plugins:
          - name: cors
    EOF
  when: oauth_server_enabled and vault_gotrue_jwt_keys is defined and jwks_route_check.rc != 0
  register: kong_jwks_route_added

# OIDC server endpoints — open routes so OIDC clients (Gitea, Grafana, etc.)
# can reach them without an apikey header. The admin /clients endpoint stays
# secured under the default auth-v1 route.
- name: Check if OIDC OAuth routes exist in Kong config
  command: grep -q 'auth-v1-open-oauth-authorize' "{{ supabase_dir }}/docker/volumes/api/kong.yml"
  register: oidc_routes_check
  failed_when: false
  changed_when: false
  when: oauth_server_enabled

- name: Add OIDC OAuth open routes to Kong config
  shell: |
    cat >> "{{ supabase_dir }}/docker/volumes/api/kong.yml" <<'EOF'
      - name: auth-v1-open-oauth-authorize
        url: http://auth:9999/oauth/authorize
        routes:
          - name: auth-v1-open-oauth-authorize
            strip_path: true
            paths:
              - /auth/v1/oauth/authorize
        plugins:
          - name: cors
      - name: auth-v1-open-oauth-token
        url: http://auth:9999/oauth/token
        routes:
          - name: auth-v1-open-oauth-token
            strip_path: true
            paths:
              - /auth/v1/oauth/token
        plugins:
          - name: cors
      - name: auth-v1-open-oauth-userinfo
        url: http://auth:9999/oauth/userinfo
        routes:
          - name: auth-v1-open-oauth-userinfo
            strip_path: true
            paths:
              - /auth/v1/oauth/userinfo
        plugins:
          - name: cors
    EOF
  when: oauth_server_enabled and oidc_routes_check.rc != 0
  register: kong_oidc_routes_added

- name: Restart Kong if config routes were added
  shell: docker restart $(docker ps --format '{% raw %}{{.Names}}{% endraw %}' | grep kong)
  when: (kong_jwks_route_added is defined and kong_jwks_route_added is changed)
        or (kong_oidc_routes_added is defined and kong_oidc_routes_added is changed)

- name: Login to GHCR
  community.docker.docker_login:
    registry: ghcr.io
    username: jjrasche
    password: "{{ vault_ghcr_token }}"
  when: vault_ghcr_token is defined and vault_ghcr_token != "CHANGE_ME"

# Render Pomerium + static-jimr configs BEFORE compose-up, otherwise
# docker auto-creates the missing bind-mount sources as directories and
# the containers fail to start ("trying to mount directory onto a file").
- name: Pre-deploy Pomerium templates (so bind-mount sources exist)
  include_role:
    name: pomerium
    tasks_from: render

- name: Start Supabase stack
  community.docker.docker_compose_v2:
    project_src: "{{ supabase_dir }}/docker"
    state: present
    remove_orphans: true
    pull: "{{ 'always' if (vault_ghcr_token is defined and vault_ghcr_token != 'CHANGE_ME') else 'missing' }}"

# Restart pomerium / static-jimr HERE when their templates changed —
# before the post-deploy verify gates. The pomerium role runs AFTER
# supabase, so any restart in that role can't run if a verify gate fails first.
# compose-up creates new containers on first apply; on subsequent applies a
# config-only change leaves the running container with the old mount, so
# explicit restart is required to pick up the rendered templates.
- name: Restart Pomerium when templates changed
  shell: docker restart supabase-pomerium-1
  when: pomerium_config_changed | default(false)
  failed_when: false
  changed_when: false

- name: Restart static-jimr when templates changed
  shell: docker restart supabase-static-jimr-1
  when: static_nginx_changed | default(false)
  failed_when: false
  changed_when: false

- name: Wait for Postgres
  shell: docker exec supabase-db pg_isready -U supabase_admin
  register: pg_ready
  retries: 12
  delay: 5
  until: pg_ready.rc == 0

- name: Create Pomerium databroker database + role
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      -v ON_ERROR_STOP=1 \
      -v pw="{{ vault_pomerium_db_password }}" <<'SQL'
    SELECT 'CREATE ROLE pomerium_db LOGIN PASSWORD ' || quote_literal(:'pw')
      WHERE NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'pomerium_db')
    \gexec
    SELECT 'ALTER ROLE pomerium_db PASSWORD ' || quote_literal(:'pw')
      WHERE EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'pomerium_db')
    \gexec
    SELECT 'CREATE DATABASE pomerium OWNER pomerium_db'
      WHERE NOT EXISTS (SELECT 1 FROM pg_database WHERE datname = 'pomerium')
    \gexec
    SQL
  register: pomerium_db_setup
  changed_when: pomerium_db_setup.stdout is search('CREATE DATABASE')
  no_log: true

# Pomerium starts before this task on first deploy and crashloops trying
# to connect to a non-existent database. Once the DB exists, restart so
# the running container reconnects cleanly instead of waiting for backoff.
- name: Restart Pomerium after databroker DB created
  shell: docker restart supabase-pomerium-1
  when: pomerium_db_setup is changed
  failed_when: false
  changed_when: false

- name: Create tenant databases
  shell: |
    docker exec supabase-db psql -U supabase_admin -d postgres -tc \
      "SELECT 1 FROM pg_database WHERE datname = '{{ item.database }}'" \
      | grep -q 1 || \
    docker exec supabase-db psql -U supabase_admin -d postgres -c \
      "CREATE DATABASE {{ item.database }}"
  loop: "{{ tenants }}"
  when: item.database is defined
  changed_when: false

- name: Copy agent migration to remote
  copy:
    src: migrations/003_agent_tables.sql
    dest: /tmp/003_agent_tables.sql
    mode: "0644"

- name: Run agent tables migration
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      < /tmp/003_agent_tables.sql
  register: agent_migration
  changed_when: "'CREATE TABLE' in agent_migration.stdout"

- name: Copy unified memory migration from unified-memory repo
  copy:
    src: "{{ playbook_dir }}/../../unified-memory/migrations/001_memory_schema.sql"
    dest: /tmp/001_memory_schema.sql
    mode: "0644"

- name: Run unified memory schema migration
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      < /tmp/001_memory_schema.sql
  register: memory_migration
  changed_when: "'CREATE TABLE' in memory_migration.stdout"

- name: Copy storage buckets migration to remote
  copy:
    src: migrations/004_storage_buckets.sql
    dest: /tmp/004_storage_buckets.sql
    mode: "0644"

- name: Run storage buckets migration
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      < /tmp/004_storage_buckets.sql
  register: storage_migration
  changed_when: "'INSERT' in storage_migration.stdout"

- name: Copy auth-trigger email-safe migration to remote
  copy:
    src: migrations/005_handle_new_auth_user_email_safe.sql
    dest: /tmp/005_handle_new_auth_user_email_safe.sql
    mode: "0644"

- name: Run auth-trigger email-safe migration
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      < /tmp/005_handle_new_auth_user_email_safe.sql
  register: auth_trigger_migration
  changed_when: "'CREATE FUNCTION' in auth_trigger_migration.stdout"

- name: Copy skip-mirror-for-email-only migration to remote
  copy:
    src: migrations/006_skip_mirror_for_email_only.sql
    dest: /tmp/006_skip_mirror_for_email_only.sql
    mode: "0644"

- name: Run skip-mirror-for-email-only migration
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      -v ON_ERROR_STOP=1 \
      < /tmp/006_skip_mirror_for_email_only.sql
  register: skip_mirror_migration
  changed_when: "'CREATE FUNCTION' in skip_mirror_migration.stdout"

# Tenant DB migrations — read each repo's supabase/migrations/*.sql in
# numeric order, copy to /tmp on VPS1, apply with ON_ERROR_STOP=1.
# Migrations must be idempotent (CREATE TABLE IF NOT EXISTS, etc.) since
# this loop runs every apply. Replaces tenant-side deploy.yml apply paths.
- name: Discover tenant migration files
  delegate_to: localhost
  become: false
  find:
    paths: "{{ playbook_dir }}/../../{{ item }}/supabase/migrations"
    patterns: "*.sql"
  loop: "{{ tenant_db_repos | default([]) }}"
  loop_control:
    label: "{{ item }}"
  register: tenant_migration_discovery

- name: Flatten tenant migrations into ordered list
  set_fact:
    tenant_migrations: "{{ (tenant_migrations | default([])) + (item.files | sort(attribute='path') | map('combine', {'repo': item.item}) | list) }}"
  loop: "{{ tenant_migration_discovery.results | default([]) }}"
  loop_control:
    label: "{{ item.item }} ({{ item.files | default([]) | length }} files)"
  when: item.files is defined

- name: Copy tenant migrations to VPS1
  copy:
    src: "{{ item.path }}"
    dest: "/tmp/tenant_{{ item.repo }}_{{ item.path | basename }}"
    mode: "0644"
  loop: "{{ tenant_migrations | default([]) }}"
  loop_control:
    label: "{{ item.repo }}/{{ item.path | basename }}"

- name: Apply tenant migrations
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      -v ON_ERROR_STOP=1 \
      < /tmp/tenant_{{ item.repo }}_{{ item.path | basename }}
  loop: "{{ tenant_migrations | default([]) }}"
  loop_control:
    label: "{{ item.repo }}/{{ item.path | basename }}"
  register: tenant_migration_apply
  changed_when: tenant_migration_apply.stdout is search('CREATE|ALTER|INSERT|GRANT|UPDATE')
  # dm/0001_initial_schema.sql references an `embedding` column that was dropped
  # from the live schema but not the migration file. That file is non-idempotent
  # in the dungeon-master repo — fix lives there, not here.
  ignore_errors: true

# Tenant developer DB access — port-forward-only SSH user + scoped Postgres
# role per tenant. Driven by `tenant_dev_db_access` in vars.yml. Each entry
# expects two vault vars by deterministic name:
#   vault_<tunnel_user>_ssh_pubkey   — developer's SSH public key
#   vault_<db_role>_db_password      — generated 24+ char random
# When either vault var is missing/empty for an entry, that entry is skipped
# (lets us land the role and password without a pubkey, then add the key later).
- name: Create tenant tunnel SSH users (port-forward only)
  user:
    name: "{{ item.tunnel_user }}"
    shell: /usr/sbin/nologin
    state: present
    create_home: true
  loop: "{{ tenant_dev_db_access | default([]) }}"
  loop_control:
    label: "{{ item.tunnel_user }}"

- name: Authorize tenant tunnel SSH keys (restrict + permitopen 5432)
  ansible.posix.authorized_key:
    user: "{{ item.tunnel_user }}"
    key: "{{ lookup('vars', 'vault_' + item.tunnel_user + '_ssh_pubkey', default='') }}"
    key_options: 'restrict,permitopen="127.0.0.1:5432"'
    exclusive: true
  loop: "{{ tenant_dev_db_access | default([]) }}"
  loop_control:
    label: "{{ item.tunnel_user }}"
  when: lookup('vars', 'vault_' + item.tunnel_user + '_ssh_pubkey', default='') | length > 0

- name: Render dev DB role setup SQL per tenant
  template:
    src: dev_db_role_setup.sql.j2
    dest: "/tmp/dev_db_role_{{ item.db_role }}.sql"
    mode: "0600"
  loop: "{{ tenant_dev_db_access | default([]) }}"
  loop_control:
    label: "{{ item.db_role }}"
  vars:
    entry: "{{ item }}"
  no_log: true

- name: Apply dev DB role setup (idempotent)
  shell: |
    docker exec -i supabase-db psql -U supabase_admin -d postgres \
      -v ON_ERROR_STOP=1 \
      -v pw="{{ lookup('vars', 'vault_' + item.db_role + '_db_password') }}" \
      < /tmp/dev_db_role_{{ item.db_role }}.sql
  loop: "{{ tenant_dev_db_access | default([]) }}"
  loop_control:
    label: "{{ item.db_role }}"
  register: dev_db_role_apply
  changed_when: dev_db_role_apply.stdout is search('CREATE|ALTER|GRANT')
  no_log: true

- name: Remove staged dev DB role setup SQL
  file:
    path: "/tmp/dev_db_role_{{ item.db_role }}.sql"
    state: absent
  loop: "{{ tenant_dev_db_access | default([]) }}"
  loop_control:
    label: "{{ item.db_role }}"

# In-repo Edge Functions (platform-owned, source under ansible/roles/supabase/files/functions/)
- name: Deploy in-repo Edge Functions
  copy:
    src: "functions/{{ item }}/"
    dest: "{{ supabase_dir }}/docker/volumes/functions/{{ item }}/"
    mode: "0644"
  loop:
    - main
    - mint-agent-token
    - mint-realtime-token
    - timeout-probe
  register: in_repo_functions_deployed

# Tenant-owned Edge Functions (source under sibling repo's supabase/functions/{name}/)
# Repos must be checked out at ../<repo>/ relative to the platform repo's root for this
# to resolve. CI checks out siblings before invoking this playbook.
- name: Deploy tenant-owned Edge Functions
  copy:
    src: "{{ playbook_dir }}/../../{{ item.repo }}/supabase/functions/{{ item.function }}/"
    dest: "{{ supabase_dir }}/docker/volumes/functions/{{ item.function }}/"
    mode: "0644"
  loop: "{{ tenant_edge_functions | default([]) }}"
  loop_control:
    label: "{{ item.repo }}/{{ item.function }}"
  register: tenant_functions_deployed
  # Skip silently if the sibling repo isn't checked out — local apply paths
  # often only have the platform repo, not every tenant.
  failed_when: false

- name: Restart Edge Functions container if any function changed
  shell: docker restart $(docker ps --format '{% raw %}{{.Names}}{% endraw %}' | grep functions)
  when: in_repo_functions_deployed is changed or tenant_functions_deployed is changed

- name: Wait for auth service to be ready
  uri:
    url: "https://{{ supabase_api_domain }}/auth/v1/health"
    headers:
      apikey: "{{ vault_anon_key }}"
    status_code: 200
  register: auth_ready
  retries: 12
  delay: 5
  until: auth_ready.status == 200

- name: Register tenant apps as OAuth clients
  uri:
    url: "https://{{ supabase_api_domain }}/auth/v1/admin/oauth/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ vault_service_role_key }}"
      apikey: "{{ vault_service_role_key }}"
      Content-Type: "application/json"
    body_format: json
    body:
      name: "{{ item.name }}"
      redirect_uris:
        - "https://{{ item.domain }}/auth/callback"
      token_endpoint_auth_method: "none"
    status_code: [200, 201, 403, 409, 422]
  loop: "{{ tenants }}"
  when: oauth_server_enabled
  register: oauth_clients
  changed_when: oauth_clients.status in [200, 201]

# Gitea is on local auth — its OIDC client (goth's openidConnect provider as of
# v1.25) doesn't send PKCE, and supabase-auth requires it for OAuth 2.1
# compliance. The V1.3 OIDC infrastructure (above) is ready for any
# PKCE-capable client (Grafana, Vaultwarden, etc.); see docs/sso-oidc-pattern.md
# for the registration recipe.

# End-of-deploy verification — actually exercise the user-facing surfaces
# we just changed. Failing here means deploy didn't reach the user, even if
# every prior task said `ok`. Add new gates here whenever we ship a feature
# that has a load-bearing assertion (a specific element in markup, a working
# endpoint, etc).
- name: Verify auth portal serves recovery UI (post-deploy gate)
  uri:
    url: "https://{{ auth_domain }}/?cb={{ portal_asset_version }}"
    return_content: true
  register: portal_check
  failed_when: "'forgot-link' not in portal_check.content or portal_asset_version not in portal_check.content"

- name: Verify api.jimr.fyi/auth/v1/health responds 200
  uri:
    url: "https://{{ supabase_api_domain }}/auth/v1/health"
    headers:
      apikey: "{{ vault_anon_key }}"
    status_code: 200

- name: Verify auth.jimr.fyi/auth/v1/health responds 200 (recovery email links resolve here)
  uri:
    url: "https://{{ auth_domain }}/auth/v1/health"
    headers:
      apikey: "{{ vault_anon_key }}"
    status_code: 200
