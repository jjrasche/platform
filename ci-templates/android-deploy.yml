# Shared CI/CD template for Android APK builds and deployment.
#
# Include in app repo's .gitlab-ci.yml:
#   include:
#     - project: 'jjrasche/platform'
#       ref: master
#       file: '/ci-templates/android-deploy.yml'
#
# Required CI/CD variables (set in GitLab project settings):
#   KEYSTORE_BASE64       — base64-encoded release keystore
#   KEYSTORE_PASSWORD     — keystore password
#   KEY_ALIAS             — signing key alias
#   KEY_PASSWORD          — signing key password
#   PLATFORM_SSH_KEY      — SSH private key for deploy@VPS
#   PLATFORM_IP           — VPS IP address
#   SUPABASE_SERVICE_KEY  — Supabase service_role key for app_releases insert
#   SUPABASE_API_URL      — Supabase REST API base URL (e.g. https://api.jimr.fyi)
#
# Required pipeline variables (set in app's .gitlab-ci.yml):
#   APP_SLUG              — app identifier (e.g. houseops)
#   APK_PATH              — relative path to built APK
#   MIN_VERSION           — minimum supported version (for forced upgrades)

stages:
  - build
  - upload
  - verify
  - register

variables:
  DIST_DOMAIN: apps.jimr.fyi
  ANDROID_SDK_VERSION: "34"
  JAVA_VERSION: "17"

build_apk:
  stage: build
  image: eclipse-temurin:${JAVA_VERSION}-jdk
  before_script:
    - apt-get update -qq && apt-get install -y -qq wget unzip
    - export ANDROID_HOME=/opt/android-sdk
    - mkdir -p "$ANDROID_HOME/cmdline-tools"
    - wget -q "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -O /tmp/cmdline-tools.zip
    - unzip -q /tmp/cmdline-tools.zip -d "$ANDROID_HOME/cmdline-tools"
    - mv "$ANDROID_HOME/cmdline-tools/cmdline-tools" "$ANDROID_HOME/cmdline-tools/latest"
    - yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses > /dev/null 2>&1 || true
    - "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-${ANDROID_SDK_VERSION}" "build-tools;${ANDROID_SDK_VERSION}.0.0"
    - export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
    # Decode keystore from CI variable
    - echo "$KEYSTORE_BASE64" | base64 -d > /tmp/release.jks
  script:
    - chmod +x ./gradlew
    - >
      ./gradlew assembleRelease
      -Pandroid.injected.signing.store.file=/tmp/release.jks
      -Pandroid.injected.signing.store.password="$KEYSTORE_PASSWORD"
      -Pandroid.injected.signing.key.alias="$KEY_ALIAS"
      -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
  after_script:
    - rm -f /tmp/release.jks
  artifacts:
    paths:
      - ${APK_PATH}
    expire_in: 7 days
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

upload_apk:
  stage: upload
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - echo "$PLATFORM_SSH_KEY" > ~/.ssh/id_deploy
    - chmod 600 ~/.ssh/id_deploy
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - export DEST_FILE="${APP_SLUG}-${VERSION}.apk"
    - >
      ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new
      "deploy@${PLATFORM_IP}"
      "mkdir -p /opt/app-dist/${APP_SLUG}"
    - >
      scp -i ~/.ssh/id_deploy -o StrictHostKeyChecking=accept-new
      "${APK_PATH}"
      "deploy@${PLATFORM_IP}:/opt/app-dist/${APP_SLUG}/${DEST_FILE}"
  after_script:
    - rm -f ~/.ssh/id_deploy
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

verify_download:
  stage: verify
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    - export DOWNLOAD_URL="https://${DIST_DOMAIN}/${APP_SLUG}/${APP_SLUG}-${VERSION}.apk"
    - echo "Verifying ${DOWNLOAD_URL}"
    - |
      HTTP_STATUS=$(curl -sf -o /dev/null -w '%{http_code}' "$DOWNLOAD_URL" || true)
      if [ "$HTTP_STATUS" != "200" ]; then
        echo "APK not downloadable (HTTP ${HTTP_STATUS})"
        exit 1
      fi
    - echo "Verified: ${DOWNLOAD_URL}"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/

register_release:
  stage: register
  image: alpine:latest
  before_script:
    - apk add --no-cache curl jq
  script:
    - export VERSION="${CI_COMMIT_TAG#v}"
    # Extract version_code from tag: v1.2.3 → 10203
    - |
      IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
      VERSION_CODE=$(( MAJOR * 10000 + MINOR * 100 + PATCH ))
    - export DOWNLOAD_URL="https://${DIST_DOMAIN}/${APP_SLUG}/${APP_SLUG}-${VERSION}.apk"
    - |
      RESPONSE=$(curl -sf -w '\n%{http_code}' \
        "${SUPABASE_API_URL}/rest/v1/app_releases" \
        -H "apikey: ${SUPABASE_SERVICE_KEY}" \
        -H "Authorization: Bearer ${SUPABASE_SERVICE_KEY}" \
        -H "Content-Type: application/json" \
        -H "Prefer: return=minimal" \
        -d "{
          \"app_slug\": \"${APP_SLUG}\",
          \"version\": \"${VERSION}\",
          \"version_code\": ${VERSION_CODE},
          \"minimum_version\": \"${MIN_VERSION}\",
          \"download_url\": \"${DOWNLOAD_URL}\"
        }")
      HTTP_CODE=$(echo "$RESPONSE" | tail -1)
      if [ "$HTTP_CODE" != "201" ]; then
        echo "Failed to register release (HTTP ${HTTP_CODE})"
        echo "$RESPONSE"
        exit 1
      fi
    - echo "Registered ${APP_SLUG} v${VERSION} (code ${VERSION_CODE})"
  rules:
    - if: $CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/
