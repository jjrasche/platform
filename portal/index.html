<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In — JMR Platform</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main id="app">
    <div class="card">
      <h1>JMR Platform</h1>

      <div id="view-loading" class="view">
        <p>Loading&hellip;</p>
      </div>

      <div id="view-login" class="view hidden">
        <p id="auth-subtitle" class="subtitle">Sign in to continue</p>
        <form id="form-email" autocomplete="on">
          <input id="input-email" type="email" placeholder="Email" autocomplete="email" required>
          <input id="input-password" type="password" placeholder="Password" autocomplete="current-password" required>
          <button type="submit" id="btn-submit" class="btn btn-primary">Sign In</button>
        </form>
        <p class="toggle-link"><a href="#" id="toggle-mode">Don't have an account? Sign up</a></p>
        <p id="login-error" class="error hidden"></p>
        <p id="login-success" class="success hidden"></p>
      </div>

      <div id="view-authorize" class="view hidden">
        <p class="subtitle">Authorizing&hellip;</p>
        <p id="authorize-app" class="app-name"></p>
      </div>

      <div id="view-denied" class="view hidden">
        <h2>Access Denied</h2>
        <p>You don't have access to this application.</p>
        <p>Contact the administrator for access.</p>
      </div>

      <div id="view-signed-in" class="view hidden">
        <p class="subtitle">You're signed in</p>
        <p id="user-email"></p>
        <button id="btn-signout" class="btn btn-secondary">Sign Out</button>
      </div>
    </div>
  </main>
  <script src="/config.js"></script>
  <script src="/app.js"></script>
</body>
</html>
